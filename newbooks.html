    <style>
        .book-card {
            transition: transform 0.4s, box-shadow 0.4s;
        }
        .book-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 30px rgba(0,0,0,0.12);
        }

        .section { padding: 4rem 0; }
        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
        }
        .book-card {
            background: #fff;
            padding: 1.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            display: flex;
            flex-direction: column;
        }
        .book-card a {
            display: block;
            text-decoration: none;
            color: inherit;
        }
        .book-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .book-card img:hover {
            transform: scale(1.02);
        }
        .book-card h3 {
            margin-bottom: 0.5rem;
            color: #5e4b3c;
            font-size: 1.2rem;
        }
        .book-card .author {
            font-weight: 600;
            color: #b5838d;
            margin-bottom: 0.5rem;
        }
