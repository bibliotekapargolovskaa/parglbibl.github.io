<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Тест Fancybox</title>
    <!-- Подключаем Fancybox CSS и JS (через CDN) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.css"/>
</head>
<body>
    <h2>Кликни на фото</h2>
    <a href="s_ylici.jpg" data-fancybox="gallery" data-caption="Тестовое фото">
        <img src="s_ylici.jpg" width="300">
    </a>

    <!-- Подключаем JS Fancybox -->
    <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.umd.js"></script>
    <script>
        // Инициализируем Fancybox
        Fancybox.bind("[data-fancybox]");
    </script>
</body>
</html>
